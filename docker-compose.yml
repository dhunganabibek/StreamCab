services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: streamcab-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "/usr/bin/kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 8s
      retries: 12

  init-kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: streamcab-init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      '
      /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists
      --topic taxi-trips --partitions 1 --replication-factor 1;
      /usr/bin/kafka-topics --bootstrap-server kafka:29092 --list;
      '

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.6.1
    container_name: streamcab-control-center
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: kafka:29092
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021

  producer:
    build:
      context: .
      dockerfile: Dockerfile
      target: producer
    container_name: streamcab-producer
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: taxi-trips
      DATA_FILE: ""
      DATA_DIR: /opt/streamcab/data/raw
      REPLAY_SLEEP_SECONDS: "0.15"
    volumes:
      - ./:/opt/streamcab

  spark-streaming:
    image: apache/spark:3.5.1
    container_name: streamcab-spark-streaming
    user: "0:0"
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INPUT_TOPIC: taxi-trips
      CHECKPOINT_DIR: /opt/streamcab/data/checkpoints/traffic_agg
      OUTPUT_DIR: /opt/streamcab/data/processed/traffic_agg
    volumes:
      - ./:/opt/streamcab
    command: >
      /opt/spark/bin/spark-submit
      --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      /opt/streamcab/apps/spark/stream_processor.py

  trainer:
    build:
      context: .
      dockerfile: Dockerfile
      target: trainer
    container_name: streamcab-trainer
    depends_on:
      spark-streaming:
        condition: service_started
    environment:
      AGGREGATE_DIR: /opt/streamcab/data/processed/traffic_agg
      RAW_DATA_DIR: /opt/streamcab/data/raw
      MODEL_OUTPUT_DIR: /opt/streamcab/data/models
      TRAINING_MIN_ROWS: "20"
      TRAINING_INTERVAL_SECONDS: "90"
      ONE_SHOT: "false"
    volumes:
      - ./:/opt/streamcab

  predictor:
    build:
      context: .
      dockerfile: Dockerfile
      target: predictor
    container_name: streamcab-predictor
    depends_on:
      trainer:
        condition: service_started
    environment:
      AGGREGATE_DIR: /opt/streamcab/data/processed/traffic_agg
      MODEL_FILE: /opt/streamcab/data/models/traffic_model.joblib
      PREDICTIONS_FILE: /opt/streamcab/data/models/realtime_predictions.parquet
      PREDICTION_INTERVAL_SECONDS: "30"
    volumes:
      - ./:/opt/streamcab

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: streamcab-dashboard
    depends_on:
      spark-streaming:
        condition: service_started
    environment:
      AGGREGATE_DIR: /opt/streamcab/data/processed/traffic_agg
      METRICS_FILE: /opt/streamcab/data/models/metrics.json
      PREDICTIONS_FILE: /opt/streamcab/data/models/realtime_predictions.parquet
      ZONE_CENTROIDS_FILE: /opt/streamcab/data/reference/zone_centroids.csv
    ports:
      - "8501:8501"
    volumes:
      - ./:/opt/streamcab
