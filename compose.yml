services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: streamcab-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "/usr/bin/kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 8s
      retries: 12

  init-kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: streamcab-init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      '
      /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists
      --topic ${KAFKA_TOPIC:-taxi-trips} --partitions 1 --replication-factor 1;
      /usr/bin/kafka-topics --bootstrap-server kafka:29092 --list;
      '

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.6.1
    container_name: streamcab-control-center
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: kafka:29092
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021
      # Disable optional integrations we're not running — prevents Connection refused spam
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: ""
      CONTROL_CENTER_KSQL_ENABLE: "false"
      CONTROL_CENTER_CONNECT_CLUSTER: ""

  producer:
    build: { context: ., dockerfile: Dockerfile, target: producer }
    container_name: streamcab-producer
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-taxi-trips}
      DATA_DIR: ${RAW_DATA_DIR:-/opt/streamcab/data/raw-data/parquet}
      REPLAY_SLEEP_SECONDS: ${REPLAY_SLEEP_SECONDS:-2.5}
      LIVE_LOG_FILE: ${LIVE_LOG_FILE:-/opt/streamcab/models/live_trips.json}
      ZONE_CENTROIDS_FILE: ${ZONE_CENTROIDS_FILE:-/opt/streamcab/data/reference/zone_centroids.csv}
    volumes:
      - ./:/opt/streamcab
      - ${RAW_DATA_HOST_PATH:-./data/raw-data}:/opt/streamcab/data/raw-data

  spark-streaming:
    image: apache/spark:3.5.1
    container_name: streamcab-spark-streaming
    user: "0:0"
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      INPUT_TOPIC: ${KAFKA_TOPIC:-taxi-trips}
      CHECKPOINT_DIR: ${CHECKPOINT_DIR:-/opt/streamcab/data/checkpoints/traffic_agg}
      OUTPUT_DIR: ${AGGREGATE_DIR:-/opt/streamcab/data/processed/traffic_agg}
    volumes:
      - ./:/opt/streamcab
    command: >
      /opt/spark/bin/spark-submit
      --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      /opt/streamcab/apps/spark/stream_processor.py

  # Usage: docker compose run --rm train-once
  train-once:
    build: { context: ., dockerfile: Dockerfile, target: trainer }
    container_name: streamcab-train-once
    environment:
      RAW_DATA_DIR: ${RAW_DATA_DIR:-/opt/streamcab/data/raw-data/parquet}
      MODEL_OUTPUT_DIR: ${MODEL_OUTPUT_DIR:-/opt/streamcab/models}
      ZONE_CENTROIDS_FILE: ${ZONE_CENTROIDS_FILE:-/opt/streamcab/data/reference/zone_centroids.csv}
      MAX_FILES: ${MAX_FILES:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./:/opt/streamcab
      - ${RAW_DATA_HOST_PATH:-./data/raw-data}:/opt/streamcab/data/raw-data
    deploy:
      resources:
        limits:
          memory: 6g
    profiles:
      - manual

  predictor:
    build: { context: ., dockerfile: Dockerfile, target: predictor }
    container_name: streamcab-predictor
    environment:
      AGGREGATE_DIR: ${AGGREGATE_DIR:-/opt/streamcab/data/processed/traffic_agg}
      MODEL_FILE: ${MODEL_FILE:-/opt/streamcab/models/traffic_model.joblib}
      PREDICTIONS_FILE: ${PREDICTIONS_FILE:-/opt/streamcab/models/realtime_predictions.parquet}
      PREDICTION_INTERVAL_SECONDS: ${PREDICTION_INTERVAL_SECONDS:-30}
    volumes:
      - ./:/opt/streamcab
      - ${RAW_DATA_HOST_PATH:-./data/raw-data}:/opt/streamcab/data/raw-data

  dashboard:
    build: { context: ., dockerfile: Dockerfile, target: dashboard }
    container_name: streamcab-dashboard
    depends_on:
      spark-streaming:
        condition: service_started
    ports:
      - "8501:8501"
    environment:
      AGGREGATE_DIR: ${AGGREGATE_DIR:-/opt/streamcab/data/processed/traffic_agg}
      RAW_DATA_DIR: ${RAW_DATA_DIR:-/opt/streamcab/data/raw-data/parquet}
      METRICS_FILE: ${METRICS_FILE:-/opt/streamcab/models/metrics.json}
      PREDICTIONS_FILE: ${PREDICTIONS_FILE:-/opt/streamcab/models/realtime_predictions.parquet}
      MODEL_FILE: ${MODEL_FILE:-/opt/streamcab/models/traffic_model.joblib}
      LIVE_LOG_FILE: ${LIVE_LOG_FILE:-/opt/streamcab/models/live_trips.json}
      ZONE_CENTROIDS_FILE: ${ZONE_CENTROIDS_FILE:-/opt/streamcab/data/reference/zone_centroids.csv}
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: poll
    volumes:
      - ./:/opt/streamcab
      - ${RAW_DATA_HOST_PATH:-./data/raw-data}:/opt/streamcab/data/raw-data
