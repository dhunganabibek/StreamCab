name: stream_cab

services:
  # Infrastructure
  postgres:
    image: postgres:16-alpine
    container_name: streamcab-postgres
    environment:
      POSTGRES_DB: streamcab
      POSTGRES_USER: streamcab
      POSTGRES_PASSWORD: streamcab
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamcab"]
      interval: 5s
      timeout: 5s
      retries: 12

  kafka:
    build:
      context: .
      dockerfile: apps/producer/Dockerfile
    container_name: streamcab-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-taxi-trips}
      DATA_DIR: /opt/streamcab/data/raw-data/parquet
      REPLAY_SLEEP_SECONDS: ${REPLAY_SLEEP_SECONDS:-2.5}
      WRITE_LIVE_TRIPS_FROM_PRODUCER: ${WRITE_LIVE_TRIPS_FROM_PRODUCER:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://streamcab:streamcab@postgres:5432/streamcab}
      ZONE_CENTROIDS_FILE: ${ZONE_CENTROIDS_FILE:-/opt/streamcab/data/reference/zone_centroids.csv}
    volumes:
      - ./:/opt/streamcab
      - ${RAW_DATA_HOST_PATH:-./data/raw-data}:/opt/streamcab/data/raw-data
      - kafka_data:/var/lib/kafka/data
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc '
      /etc/confluent/docker/run &
      KAFKA_PID=$$!;
      until /usr/bin/kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1; do
        echo "Kafka not ready yet, waiting...";
        sleep 2;
      done;
      python -u /opt/streamcab/apps/producer/producer.py &
      PRODUCER_PID=$$!;
      wait -n "$$KAFKA_PID" "$$PRODUCER_PID"
      '
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "/usr/bin/kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 8s
      retries: 12

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.6.1
    container_name: streamcab-control-center
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: kafka:29092
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021
      CONTROL_CENTER_KSQL_ENABLE: "false"

  # App runtime
  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    container_name: streamcab-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-taxi-trips}
      DATABASE_URL: ${DATABASE_URL:-postgresql://streamcab:streamcab@postgres:5432/streamcab}
      POSTGRES_JDBC_URL: ${POSTGRES_JDBC_URL:-jdbc:postgresql://postgres:5432/streamcab}
      POSTGRES_USER: ${POSTGRES_USER:-streamcab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streamcab}
      MODEL_FILE: ${MODEL_FILE:-/opt/streamcab/models/traffic_model.joblib}
      PREDICTION_INTERVAL_SECONDS: ${PREDICTION_INTERVAL_SECONDS:-30}
      ZONE_CENTROIDS_FILE: ${ZONE_CENTROIDS_FILE:-/opt/streamcab/data/reference/zone_centroids.csv}
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: poll
    volumes:
      - ./:/opt/streamcab
    command: >
      bash -lc '
      spark-submit --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.postgresql:postgresql:42.7.3
      /opt/streamcab/apps/spark/stream_processor.py &
      SPARK_PID=$$!;
      python -u /opt/streamcab/apps/predictor/predict_realtime.py &
      PREDICTOR_PID=$$!;
      streamlit run /opt/streamcab/apps/dashboard/app.py --server.port=8501 --server.address=0.0.0.0 &
      DASHBOARD_PID=$$!;
      wait -n "$$SPARK_PID" "$$PREDICTOR_PID" "$$DASHBOARD_PID"
      '

  consumer:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    container_name: streamcab-consumer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-taxi-trips}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-streamcab-live-consumer}
      LIVE_TRIPS_INSERT_BATCH_SIZE: ${LIVE_TRIPS_INSERT_BATCH_SIZE:-200}
      LIVE_TRIPS_FLUSH_INTERVAL_SECONDS: ${LIVE_TRIPS_FLUSH_INTERVAL_SECONDS:-1.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://streamcab:streamcab@postgres:5432/streamcab}
    volumes:
      - ./:/opt/streamcab
    command: >
      python -u /opt/streamcab/apps/consumer/consume_to_postgres.py

  # One-shot / Manual Training
  # Usage: docker compose run --rm train-once
  train-once:
    build:
      context: .
      dockerfile: apps/trainer/Dockerfile
    container_name: streamcab-train-once
    environment:
      # Local path by default; can be overridden to s3://... for training.
      RAW_DATA_DIR: ${RAW_DATA_DIR:-/opt/streamcab/data/raw-data/parquet}
      ZONE_CENTROIDS_FILE: ${ZONE_CENTROIDS_FILE:-/opt/streamcab/data/reference/zone_centroids.csv}
      MAX_FILES: ${MAX_FILES:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./:/opt/streamcab
      - ${RAW_DATA_HOST_PATH:-./data/raw-data}:/opt/streamcab/data/raw-data
    deploy:
      resources:
        limits:
          memory: 6g
    profiles:
      - manual

volumes:
  postgres_data:
  kafka_data:
