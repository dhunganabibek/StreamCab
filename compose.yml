name: stream_cab

# Shared defaults referenced by multiple services.
x-db-url: &db-url postgresql://streamcab:streamcab@postgres:5432/streamcab
x-kafka-servers: &kafka-servers kafka:29092
x-kafka-topic: &kafka-topic taxi-trips

services:
  # Infrastructure

  postgres:
    image: postgres:16-alpine
    container_name: streamcab-postgres
    environment:
      POSTGRES_DB: streamcab
      POSTGRES_USER: streamcab
      POSTGRES_PASSWORD: streamcab
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamcab"]
      interval: 5s
      timeout: 5s
      retries: 12

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: streamcab-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "/usr/bin/kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 8s
      retries: 12

  producer:
    build:
      context: .
      dockerfile: apps/producer/Dockerfile
    develop:
      watch:
        - path: apps/producer/Dockerfile
          action: rebuild
    container_name: streamcab-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: *kafka-servers
      KAFKA_TOPIC: *kafka-topic
      DATABASE_URL: *db-url
      DATA_DIR: /opt/streamcab/data/raw-data/parquet
      REPLAY_SLEEP_SECONDS: ${REPLAY_SLEEP_SECONDS:-2.5}
      WRITE_LIVE_TRIPS_FROM_PRODUCER: ${WRITE_LIVE_TRIPS_FROM_PRODUCER:-false}
    volumes:
      - ./:/opt/streamcab
      - ${RAW_DATA_HOST_PATH:-./data/raw-data}:/opt/streamcab/data/raw-data
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: python -u /opt/streamcab/apps/producer/producer.py

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.6.1
    container_name: streamcab-control-center
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: *kafka-servers
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021
      CONTROL_CENTER_KSQL_ENABLE: "false"
      CONTROL_CENTER_SCHEMA_REGISTRY_ENABLE: "false"

  # ── App runtime ─────────────────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    develop:
      watch:
        - path: pyproject.toml
          action: rebuild
        - path: apps/app/Dockerfile
          action: rebuild
    container_name: streamcab-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: *kafka-servers
      KAFKA_TOPIC: *kafka-topic
      DATABASE_URL: *db-url
      POSTGRES_JDBC_URL: ${POSTGRES_JDBC_URL:-jdbc:postgresql://postgres:5432/streamcab}
      POSTGRES_USER: streamcab
      POSTGRES_PASSWORD: streamcab
      SPARK_CHECKPOINT_DIR: /opt/streamcab/.spark-checkpoints/traffic_agg
      KAFKA_STARTING_OFFSETS: ${KAFKA_STARTING_OFFSETS:-latest}
      KAFKA_FAIL_ON_DATA_LOSS: ${KAFKA_FAIL_ON_DATA_LOSS:-true}
      PREDICTION_INTERVAL_SECONDS: ${PREDICTION_INTERVAL_SECONDS:-30}
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: poll
    volumes:
      - ./:/opt/streamcab
    command: >
      bash -lc '
      spark-submit --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.postgresql:postgresql:42.7.3
      /opt/streamcab/apps/spark/stream_processor.py &
      SPARK_PID=$$!;
      python -u /opt/streamcab/apps/predictor/predict_realtime.py &
      PREDICTOR_PID=$$!;
      streamlit run /opt/streamcab/apps/dashboard/app.py --server.port=8501 --server.address=0.0.0.0 &
      DASHBOARD_PID=$$!;
      wait -n "$$SPARK_PID" "$$PREDICTOR_PID" "$$DASHBOARD_PID"
      '

  consumer:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      args:
        EXTRAS: "consumer"
    container_name: streamcab-consumer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: *kafka-servers
      KAFKA_TOPIC: *kafka-topic
      DATABASE_URL: *db-url
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-streamcab-live-consumer}
      LIVE_TRIPS_INSERT_BATCH_SIZE: ${LIVE_TRIPS_INSERT_BATCH_SIZE:-200}
      LIVE_TRIPS_FLUSH_INTERVAL_SECONDS: ${LIVE_TRIPS_FLUSH_INTERVAL_SECONDS:-1.0}
      LIVE_TRIPS_RETENTION_MINUTES: ${LIVE_TRIPS_RETENTION_MINUTES:-10}
    volumes:
      - ./:/opt/streamcab
    command: python -u /opt/streamcab/apps/consumer/consume_to_postgres.py

  # ── One-shot training ───────────────────────────────────────────────────────
  # Usage: docker compose run --rm train-once

  train-once:
    build:
      context: .
      dockerfile: apps/trainer/Dockerfile
    container_name: streamcab-train-once
    environment:
      RAW_DATA_DIR: ${RAW_DATA_DIR:-/opt/streamcab/data/raw-data/parquet}
      MAX_FILES: ${MAX_FILES:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./:/opt/streamcab
      - ${RAW_DATA_HOST_PATH:-./data/raw-data}:/opt/streamcab/data/raw-data
    deploy:
      resources:
        limits:
          memory: 6g
    profiles:
      - manual

volumes:
  postgres_data:
  kafka_data:
